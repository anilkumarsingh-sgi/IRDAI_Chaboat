[theme]
primaryColor = "#003087"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#E8F0FE"
textColor = "#1A1A2E"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "info"

[server]
headless = true
runOnSave = true
port = 8501
maxUploadSize = 200
enableXsrfProtection = false
enableCORS = true

[browser]
gatherUsageStats = false
serverAddress = "localhost"
